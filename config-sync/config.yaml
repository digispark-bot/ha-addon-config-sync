name: "Config Sync (GitOps)"
description: >-
  Bidirectional GitOps for Home Assistant — pulls config from GitHub,
  validates and reloads; exports HA-side changes back to GitHub.
  Zero SSH, fully GUI-managed.
version: "1.5.1"
slug: "config-sync"
url: "https://github.com/JLay2026/ha-addon-config-sync"
startup: application
boot: auto
arch:
  - amd64
  - aarch64
  - armv7
  - i386
init: false
# Permissions:
#   homeassistant_api: true — Core API access (check_config, reload_all,
#                              /core/api/* probes, persistent_notification
#                              create/dismiss for sync-failure notifications,
#                              /core/restart for the Sprint 3 lovelace
#                              heuristic, frontend.reload_themes for themes,
#                              POST /core/api/states/sensor.config_sync_status
#                              for the Sprint 4 status sensor)
#   hassio_api: true       — Supervisor API access (POST /backups/new/partial
#                              for the pre-sync HA backup feature; v1.2.0+)
#   hassio_role: backup    — least-privilege role granting the backups API.
#                              `manager` would also work but is broader than
#                              necessary.
# See: GitHub issue #8 for the regression that prompted the hassio_api +
# hassio_role grant in v1.2.1.
homeassistant_api: true
hassio_api: true
hassio_role: backup
map:
  - config:rw
options:
  github_repo: ""
  branch: "main"
  check_interval: 300
  sync_paths:
    - "configuration.yaml"
    - "automations.yaml"
    - "scripts.yaml"
    - "scenes.yaml"
    - "groups.yaml"
    - "customize.yaml"
    - "packages/"
    - "dashboards/"
    - "scripts/"
  github_pat: ""
  export_enabled: false
  export_interval: 3600
  export_branch: ""
  export_commit_message: "export: HA config snapshot"
  post_sync_settle_seconds: 5
  notify_on_failure: true
  restart_on_lovelace_change: true
  strict_sync_paths_check: true
schema:
  github_repo: "url"
  branch: "str"
  check_interval: "int(60,3600)"
  sync_paths:
    - "str"
  github_pat: "str?"
  export_enabled: "bool"
  export_interval: "int(300,86400)"
  export_branch: "str?"
  export_commit_message: "str?"
  post_sync_settle_seconds: "int(0,60)"
  notify_on_failure: "bool"
  restart_on_lovelace_change: "bool"
  strict_sync_paths_check: "bool"
